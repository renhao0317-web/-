    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2a37;
            --muted: #5b6470;
            --line: #d7dee8;
            --accent: #1d4ed8;
            --accent2: #ea580c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 10% 10%, #edf3ff 0%, var(--bg) 45%, #f7f9fc 100%);
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 24px;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.5px;
        }
        .subtitle {
            margin: 8px 0 20px;
            color: var(--muted);
            font-size: 14px;
        }
        .toolbar {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: end;
            margin-bottom: 14px;
            box-shadow: 0 6px 22px rgba(21, 46, 86, 0.06);
        }
        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 1200;
            background: var(--bg);
            padding: 8px 0 6px;
            margin: -8px 0 8px;
            border-bottom: 1px solid rgba(215, 222, 232, 0.8);
            backdrop-filter: blur(6px);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 240px;
        }
        .control-group label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }
        select, button {
            height: 38px;
            border-radius: 8px;
            border: 1px solid var(--line);
            padding: 0 10px;
            background: #fff;
            color: var(--text);
            font-size: 14px;
        }
        button {
            cursor: pointer;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff;
            border: none;
            font-weight: 600;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        .chart-box {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 6px 22px rgba(21, 46, 86, 0.06);
        }
        .chart-title {
            margin: 0 0 8px;
            font-size: 16px;
            font-weight: 700;
        }
        .chart-wrap {
            height: 420px;
        }
        .chart-wrap-top {
            height: 520px;
        }
        .footnote {
            color: var(--muted);
            font-size: 12px;
            margin-top: 2px;
        }
        @media (max-width: 980px) {
            .chart-grid { grid-template-columns: 1fr; }
            .chart-wrap { height: 360px; }
            .chart-wrap-top { height: 420px; }
            .container { padding: 14px; }
            .sticky-top { top: 0; }
        }
    </style>
</head>

            <div class="toolbar">

                <div class="control-group">

        function parsePercent(cell) {
            const v = (cell || "").trim();
            if (!v || v === "/") return null;
            const n = Number(v.replace("%", ""));
            return Number.isFinite(n) ? n : null;
        }

        function parsePeriod(period) {
            const m = period.match(/(\d{4})年(\d{1,2})月/);
            if (!m) return 0;
            return Date.UTC(Number(m[1]), Number(m[2]) - 1, 1);
        }

        function periodToCode(period) {
            const m = period.match(/(\d{4})年(\d{1,2})月/);
            if (!m) return period;
            const mm = String(Number(m[2])).padStart(2, "0");
            return `${m[1]}${mm}`;
        }

        function parseData(csvText) {

                    mode = "return";

                products.forEach((p, i) => {

            }

            const months = Object.keys(newByMonth);
            const monthsDesc = [...months].sort((a, b) => parsePeriod(b) - parsePeriod(a));
            const monthsAsc = [...months].sort((a, b) => parsePeriod(a) - parsePeriod(b));
            return { products, monthsDesc, monthsAsc, newByMonth, returnByMonth };
        }

        function monthSeries(dataMap, month, products) {
            const row = dataMap[month] || {};
            return products
                .map((p) => ({ product: p, value: row[p] }))
                .filter((x) => Number.isFinite(x.value))
                .sort((a, b) => b.value - a.value);
        }

        function productSeries(data, product) {
            const labels = [];
            const newVals = [];
            const returnVals = [];
            for (const m of data.monthsAsc) {
                const n = data.newByMonth[m] ? data.newByMonth[m][product] : null;
                const r = data.returnByMonth[m] ? data.returnByMonth[m][product] : null;
                if (!Number.isFinite(n) && !Number.isFinite(r)) continue;
                labels.push(m);
                newVals.push(Number.isFinite(n) ? n : null);
                returnVals.push(Number.isFinite(r) ? r : null);
            }
            return { labels, newVals, returnVals };
        }

        function productSeriesInRange(data, product, startMonth, endMonth) {
            const s = parsePeriod(startMonth);
            const e = parsePeriod(endMonth);
            const from = Math.min(s, e);
            const to = Math.max(s, e);

            const startCodeCandidate = periodToCode(startMonth);
            const endCodeCandidate = periodToCode(endMonth);
            const rangeStartCode = startCodeCandidate <= endCodeCandidate ? startCodeCandidate : endCodeCandidate;
            const rangeEndCode = startCodeCandidate <= endCodeCandidate ? endCodeCandidate : startCodeCandidate;

            const productStartCode = PRODUCT_START_MONTH[product] || null;
            const effectiveStartCode = productStartCode && productStartCode > rangeStartCode
                ? productStartCode
                : rangeStartCode;

            if (effectiveStartCode > rangeEndCode) {
                return { labels: [], newVals: [], returnVals: [] };
            }

            const labels = [];
            const newVals = [];
            const returnVals = [];

            for (const m of data.monthsAsc) {
                const t = parsePeriod(m);
                if (t < from || t > to) continue;

                const code = periodToCode(m);
                if (code < effectiveStartCode || code > rangeEndCode) continue;

                const n = data.newByMonth[m] ? data.newByMonth[m][product] : null;
                const r = data.returnByMonth[m] ? data.returnByMonth[m][product] : null;
                if (!Number.isFinite(n) && !Number.isFinite(r)) continue;

                labels.push(m);
                newVals.push(Number.isFinite(n) ? n : null);
                returnVals.push(Number.isFinite(r) ? r : null);
            }
            return { labels, newVals, returnVals };
        }

        function cumulativeProductSeries(data, product, startMonth, endMonth) {
            const s = parsePeriod(startMonth);
            const e = parsePeriod(endMonth);
            const from = Math.min(s, e);
            const to = Math.max(s, e);

            const startCodeCandidate = periodToCode(startMonth);
            const endCodeCandidate = periodToCode(endMonth);
            const rangeStartCode = startCodeCandidate <= endCodeCandidate ? startCodeCandidate : endCodeCandidate;
            const rangeEndCode = startCodeCandidate <= endCodeCandidate ? endCodeCandidate : startCodeCandidate;

            const productStartCode = PRODUCT_START_MONTH[product] || null;
            const effectiveStartCode = productStartCode && productStartCode > rangeStartCode
                ? productStartCode
                : rangeStartCode;

            if (effectiveStartCode > rangeEndCode) {
                return { labels: [], newVals: [], returnVals: [] };
            }

            const labels = [];
            const newVals = [];
            const returnVals = [];
            let regSum = 0;
            let retSum = 0;
            let totalSum = 0;

            for (const m of data.monthsAsc) {
                const t = parsePeriod(m);
                if (t < from || t > to) continue;

                const code = periodToCode(m);
                if (code < effectiveStartCode || code > rangeEndCode) continue;

                const rec = RAW_COUNTS?.countsByCode?.[code]?.[product];
                if (!rec) continue;
                const reg = Number(rec.reg);
                const ret = Number(rec.ret);
                const total = Number(rec.total);
                if (!Number.isFinite(total) || total <= 0) continue;

                regSum += Number.isFinite(reg) ? reg : 0;
                retSum += Number.isFinite(ret) ? ret : 0;
                totalSum += total;

                labels.push(m);
                newVals.push((regSum / totalSum) * 100);
                returnVals.push((retSum / totalSum) * 100);
            }

            return { labels, newVals, returnVals };
        }

        function intervalSeries(data, startMonth, endMonth) {
            const s = parsePeriod(startMonth);
            const e = parsePeriod(endMonth);
            const from = Math.min(s, e);
            const to = Math.max(s, e);
            const startCodeCandidate = periodToCode(startMonth);
            const endCodeCandidate = periodToCode(endMonth);
            const rangeStartCode = startCodeCandidate <= endCodeCandidate ? startCodeCandidate : endCodeCandidate;
            const rangeEndCode = startCodeCandidate <= endCodeCandidate ? endCodeCandidate : startCodeCandidate;
            const monthsInRange = data.monthsAsc.filter((m) => {
                const t = parsePeriod(m);
                return t >= from && t <= to;
            });

            const rows = data.products
                .map((p) => {
                    const productStartCode = PRODUCT_START_MONTH[p] || null;
                    const effectiveStartCode = productStartCode && productStartCode > rangeStartCode
                        ? productStartCode
                        : rangeStartCode;
                    // If this product hasn't started within selected range, hide it completely.
                    if (effectiveStartCode > rangeEndCode) {
                        return { product: p, newStrict: null, returnStrict: null };
                    }

                    let regSum = 0;
                    let retSum = 0;
                    let totalSum = 0;

                    for (const m of monthsInRange) {
                        const code = periodToCode(m);
                        if (code < effectiveStartCode || code > rangeEndCode) continue;
                        const rec = RAW_COUNTS?.countsByCode?.[code]?.[p];
                        if (!rec) continue;
                        const reg = Number(rec.reg);
                        const ret = Number(rec.ret);
                        const total = Number(rec.total);
                        if (!Number.isFinite(total) || total <= 0) continue;

                        regSum += Number.isFinite(reg) ? reg : 0;
                        retSum += Number.isFinite(ret) ? ret : 0;
                        totalSum += total;
                    }

                    const newStrict = totalSum > 0 ? (regSum / totalSum) * 100 : null;
                    const returnStrict = totalSum > 0 ? (retSum / totalSum) * 100 : null;
                    return {
                        product: p,
                        newStrict,
                        returnStrict,
                    };
                })
                .filter((r) => Number.isFinite(r.newStrict) || Number.isFinite(r.returnStrict))
                .sort((a, b) => (b.newStrict ?? -1) - (a.newStrict ?? -1));

            return { monthsInRange, rows };
        }

        const DATA = parseData(rawCsv);
        DATA.products = [...new Set(DATA.products.map((x) => x.trim()).filter(Boolean))];
        DATA.monthsDesc = [...new Set(DATA.monthsDesc.map((x) => x.trim()).filter(Boolean))];
        DATA.monthsAsc = [...new Set(DATA.monthsAsc.map((x) => x.trim()).filter(Boolean))];

        const palette = ["#3b82f6", "#6366f1", "#0ea5e9", "#14b8a6", "#10b981", "#84cc16", "#eab308", "#f59e0b", "#f97316", "#ef4444", "#ec4899", "#8b5cf6", "#06b6d4", "#22c55e", "#64748b"];

        // Avoid duplicated options when opening files exported from current DOM snapshot.
        rangeStartSelect.innerHTML = "";
        rangeEndSelect.innerHTML = "";
        monthSelect.innerHTML = "";
        productSelect.innerHTML = "";

        for (const m of DATA.monthsAsc) {
            const text = `${m}`;

            const opStart = document.createElement("option");
            opStart.value = m;
            opStart.textContent = text;
            rangeStartSelect.appendChild(opStart);

            const opEnd = document.createElement("option");
            opEnd.value = m;
            opEnd.textContent = text;
            rangeEndSelect.appendChild(opEnd);
        }

        for (const m of DATA.monthsDesc) {
            const op = document.createElement("option");
            op.value = m;
            op.textContent = m;
            monthSelect.appendChild(op);
        }
        for (const p of DATA.products) {
            const op = document.createElement("option");
            op.value = p;
            op.textContent = p;
            productSelect.appendChild(op);
        }

        rangeStartSelect.value = DATA.monthsAsc[0];
        rangeEndSelect.value = DATA.monthsAsc[DATA.monthsAsc.length - 1];
        monthSelect.value = DATA.monthsDesc[0];
        productSelect.value = DATA.products.includes("杖剑传说") ? "杖剑传说" : DATA.products[0];

        const percentTick = (value) => `${value}%`;
        const percentTooltipLabel = (context) => {
            const indexAxis = context?.chart?.options?.indexAxis || "x";
            const parsed = context?.parsed || {};
            let rawVal;
            if (indexAxis === "y") {
                // Horizontal bars: value is on x axis.
                rawVal = parsed.x;
            } else {
                // Vertical bars / lines: value is on y axis.
                rawVal = parsed.y;
            }
            if (!Number.isFinite(Number(rawVal))) {
                rawVal = context.raw;
            }
            const val = Number(rawVal);
            return `${context.dataset.label}: ${formatPercent(val)}`;
        };

        const chartRangeAgg = new Chart(document.getElementById("chartRangeAgg"), {
            type: "bar",
            data: {
                labels: [],
                datasets: [
                    {
                        label: "买量新增占比",
                        data: [],
                        backgroundColor: "rgba(29, 78, 216, 0.88)",
                        borderRadius: 6
                    },
                    {
                        label: "买量回流占比",
                        data: [],
                        backgroundColor: "rgba(234, 88, 12, 0.88)",
                        borderRadius: 6
                    }
                ]
            },
            options: {
                indexAxis: "y",
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: "top" },
                    tooltip: {
                        callbacks: {
                            label: percentTooltipLabel,
                        },
                    },
                },
                scales: {
                    x: { beginAtZero: true, max: 100, ticks: { callback: percentTick } },
                    y: { ticks: { autoSkip: false } }
                }
            }
        });

        const chartNewByMonth = new Chart(document.getElementById("chartNewByMonth"), {
            type: "bar",
            data: { labels: [], datasets: [{ label: "买量新增占比", data: [], backgroundColor: [], borderRadius: 6 }] },
            options: {
                indexAxis: "y",
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: percentTooltipLabel,
                        },
                    },
                },
                scales: {
                    x: { beginAtZero: true, max: 100, ticks: { callback: percentTick } },
                    y: { ticks: { autoSkip: false } }
                }
            }
        });

        const chartReturnByMonth = new Chart(document.getElementById("chartReturnByMonth"), {
            type: "bar",
            data: { labels: [], datasets: [{ label: "买量回流占比", data: [], backgroundColor: [], borderRadius: 6 }] },
            options: {
                indexAxis: "y",
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: percentTooltipLabel,
                        },
                    },
                },
                scales: {
                    x: { beginAtZero: true, max: 100, ticks: { callback: percentTick } },
                    y: { ticks: { autoSkip: false } }
                }
            }
        });

        const chartTrendByProduct = new Chart(document.getElementById("chartTrendByProduct"), {
            type: "line",
            data: {
                labels: [],
                datasets: [
                    {
                        label: "买量新增占比",
                        data: [],
                        borderColor: "#1d4ed8",
                        backgroundColor: "rgba(29, 78, 216, 0.15)",
                        fill: true,
                        tension: 0.25,
                        pointRadius: 3
                    },
                    {
                        label: "买量回流占比",
                        data: [],
                        borderColor: "#ea580c",
                        backgroundColor: "rgba(234, 88, 12, 0.15)",
                        fill: true,
                        tension: 0.25,
                        pointRadius: 3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: "top" },
                    tooltip: {
                        callbacks: {
                            label: percentTooltipLabel,
                        },
                    },
                },
                scales: { y: { beginAtZero: true, max: 100, ticks: { callback: percentTick } } }
            }
        });

        const chartStackByProduct = new Chart(document.getElementById("chartStackByProduct"), {
            type: "bar",
            data: {
                labels: [],
                datasets: [
                    { label: "买量新增占比", data: [], backgroundColor: "rgba(29, 78, 216, 0.85)" },
                    { label: "买量回流占比", data: [], backgroundColor: "rgba(234, 88, 12, 0.85)" }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: "top" },
                    tooltip: {
                        callbacks: {
                            label: percentTooltipLabel,
                        },
                    },
                },
                scales: {
                    x: { stacked: true },
                    y: { stacked: true, beginAtZero: true, max: 100, ticks: { callback: percentTick } }
                }
            }
        });

        const chartCumTrendByProduct = new Chart(document.getElementById("chartCumTrendByProduct"), {
            type: "line",
            data: {
                labels: [],
                datasets: [
                    {
                        label: "累计新增占比",
                        data: [],
                        borderColor: "#2563eb",
                        backgroundColor: "rgba(37, 99, 235, 0.15)",
                        fill: true,
                        tension: 0.25,
                        pointRadius: 3
                    },
                    {

                        data: [],

                        backgroundColor: "rgba(249, 115, 22, 0.15)",
                        fill: true,
                        tension: 0.25,
                        pointRadius: 3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: "top" },
                    tooltip: {
                        callbacks: {
                            label: percentTooltipLabel,
                        },
                    },
                },
                scales: { y: { beginAtZero: true, max: 100, ticks: { callback: percentTick } } }
            }
        });

        const chartCumStackByProduct = new Chart(document.getElementById("chartCumStackByProduct"), {
            type: "bar",
            data: {
                labels: [],
                datasets: [
                    { label: "累计新增占比", data: [], backgroundColor: "rgba(37, 99, 235, 0.85)" },
                    { label: "累计回流占比", data: [], backgroundColor: "rgba(249, 115, 22, 0.85)" }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: "top" },
                    tooltip: {
                        callbacks: {
                            label: percentTooltipLabel,
                        },
                    },
                },
                scales: {
                    x: { stacked: true },
                    y: { stacked: true, beginAtZero: true, max: 100, ticks: { callback: percentTick } }
                }
            }
        });

        function refreshIntervalChart() {
            let startMonth = rangeStartSelect.value;
            let endMonth = rangeEndSelect.value;
            if (!startMonth || !endMonth) return;

            if (parsePeriod(startMonth) > parsePeriod(endMonth)) {
                [startMonth, endMonth] = [endMonth, startMonth];
                rangeStartSelect.value = startMonth;
                rangeEndSelect.value = endMonth;
            }

            const s = intervalSeries(DATA, startMonth, endMonth);
            titleRangeAgg.textContent = `累计区间 ${startMonth}-${endMonth} 各产品占比`;

            chartRangeAgg.data.labels = s.rows.map((x) => x.product);
            chartRangeAgg.data.datasets[0].data = s.rows.map((x) => x.newStrict);
            chartRangeAgg.data.datasets[1].data = s.rows.map((x) => x.returnStrict);
            chartRangeAgg.update();
        }

        function refreshMonthCharts() {
            const month = monthSelect.value;
            const newSeries = monthSeries(DATA.newByMonth, month, DATA.products);
            const returnSeries = monthSeries(DATA.returnByMonth, month, DATA.products);

            titleNewByMonth.textContent = `${month} 各产品买量新增占比`;
            titleReturnByMonth.textContent = `${month} 各产品买量回流占比`;

            chartNewByMonth.data.labels = newSeries.map((x) => x.product);
            chartNewByMonth.data.datasets[0].data = newSeries.map((x) => x.value);
            chartNewByMonth.data.datasets[0].backgroundColor = newSeries.map((_, i) => palette[i % palette.length]);
            chartNewByMonth.update();

            chartReturnByMonth.data.labels = returnSeries.map((x) => x.product);
            chartReturnByMonth.data.datasets[0].data = returnSeries.map((x) => x.value);
            chartReturnByMonth.data.datasets[0].backgroundColor = returnSeries.map((_, i) => palette[i % palette.length]);
            chartReturnByMonth.update();
        }

        function refreshProductCharts() {
            const product = productSelect.value;
            let startMonth = rangeStartSelect.value;
            let endMonth = rangeEndSelect.value;
            if (parsePeriod(startMonth) > parsePeriod(endMonth)) {
                [startMonth, endMonth] = [endMonth, startMonth];
            }
            const s = productSeriesInRange(DATA, product, startMonth, endMonth);
            const cum = cumulativeProductSeries(DATA, product, startMonth, endMonth);

            titleTrendByProduct.textContent = `${product} 买量新增 vs 回流占比趋势`;
            titleStackByProduct.textContent = `${product} 新增/回流占比堆叠`;
            titleCumTrendByProduct.textContent = `${product} 累计占比变化趋势（${startMonth} - ${endMonth}）`;
            titleCumStackByProduct.textContent = `${product} 分月累计占比堆叠（${startMonth} - ${endMonth}）`;

            chartTrendByProduct.data.labels = s.labels;
            chartTrendByProduct.data.datasets[0].data = s.newVals;
            chartTrendByProduct.data.datasets[1].data = s.returnVals;
            chartTrendByProduct.update();

            chartStackByProduct.data.labels = s.labels;
            chartStackByProduct.data.datasets[0].data = s.newVals;
            chartStackByProduct.data.datasets[1].data = s.returnVals;
            chartStackByProduct.update();

            chartCumTrendByProduct.data.labels = cum.labels;
            chartCumTrendByProduct.data.datasets[0].data = cum.newVals;
            chartCumTrendByProduct.data.datasets[1].data = cum.returnVals;
            chartCumTrendByProduct.update();

            chartCumStackByProduct.data.labels = cum.labels;
            chartCumStackByProduct.data.datasets[0].data = cum.newVals;
            chartCumStackByProduct.data.datasets[1].data = cum.returnVals;
            chartCumStackByProduct.update();
        }

        rangeStartSelect.addEventListener("change", () => { refreshIntervalChart(); refreshProductCharts(); });
        rangeEndSelect.addEventListener("change", () => { refreshIntervalChart(); refreshProductCharts(); });
        monthSelect.addEventListener("change", () => { refreshMonthCharts(); refreshProductCharts(); });
        productSelect.addEventListener("change", refreshProductCharts);

        document.getElementById("downloadHtmlBtn").addEventListener("click", () => {
            const blob = new Blob([document.documentElement.outerHTML], { type: "text/html;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "买量新增回流占比_交互看板_分享版.html";
            a.click();
            URL.revokeObjectURL(url);
        });

        refreshIntervalChart();
        refreshMonthCharts();
        refreshProductCharts();
    </script>
